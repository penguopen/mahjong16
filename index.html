<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>麻雀16 - 台灣正宗16張麻將</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="table-surface"></div>
  <div class="table-border"></div>

  <div class="info-bar">
    <div class="info-item"><span class="info-label">莊家</span><span class="info-value dealer-badge" id="dealer">東</span></div>
    <div class="info-item"><span class="info-label">剩餘</span><span class="info-value" id="remaining">70</span></div>
    <div class="game-title">🀄 麻雀16</div>
    <div class="info-item"><span class="info-label">局數</span><span class="info-value" id="round">東一局</span></div>
    <button class="settings-btn" id="settingsBtn">⚙️</button>
  </div>

  <div class="game-area">
    <!-- AI-3 top row -->
    <div class="opponent-row opponent-top" id="opponentTop">
      <div class="player-avatar avatar-ai" id="avatar3">
        <div class="avatar-icon">🀠</div>
        <div class="avatar-name">AI-3</div>
        <div class="avatar-score" id="ai3Score">1000</div>
        <div class="avatar-tiles-count" id="ai3TilesCount"><span>16</span>張</div>
      </div>
      <div class="opponent-tiles-h" id="ai3Hand"></div>
      <div class="opponent-meld" id="ai3Meld"></div>
    </div>

    <!-- Middle row: AI-1 left | Center widget | AI-2 right -->
    <div class="table-middle">
      <div class="opponent-col opponent-left" id="opponentLeft">
        <div class="player-avatar avatar-ai" id="avatar1">
          <div class="avatar-icon">🀠</div>
          <div class="avatar-name">AI-1</div>
          <div class="avatar-score" id="ai1Score">1000</div>
          <div class="avatar-tiles-count" id="ai1TilesCount"><span>16</span>張</div>
        </div>
        <div class="opponent-tiles-v" id="ai1Hand"></div>
        <div class="opponent-meld" id="ai1Meld"></div>
      </div>

      <!-- Central Widget -->
      <div class="central-widget" id="centralWidget">
        <div class="widget-frame">
          <div class="direction-labels">
            <span class="dir dir-n" id="dirNorth">北</span>
            <span class="dir dir-s" id="dirSouth">南</span>
            <span class="dir dir-w" id="dirWest">西</span>
            <span class="dir dir-e active" id="dirEast">東</span>
          </div>
          <div class="led-timer" id="ledTimer">70</div>
          <div class="widget-subtitle" id="betInfo">底 <span id="basePrice">50</span>元 / 台 <span id="taiPrice">20</span>元</div>
        </div>
      </div>

      <div class="opponent-col opponent-right" id="opponentRight">
        <div class="player-avatar avatar-ai" id="avatar2">
          <div class="avatar-icon">🀠</div>
          <div class="avatar-name">AI-2</div>
          <div class="avatar-score" id="ai2Score">1000</div>
          <div class="avatar-tiles-count" id="ai2TilesCount"><span>16</span>張</div>
        </div>
        <div class="opponent-tiles-v" id="ai2Hand"></div>
        <div class="opponent-meld" id="ai2Meld"></div>
      </div>
    </div>

    <!-- Discard area + Wall info (below center widget) -->
    <div class="table-discard-row">
      <div class="discard-area" id="discardArea">
        <div class="discard-label">捨牌</div>
        <div class="discard-tiles" id="discardTiles"></div>
      </div>
      <div class="wall-panel">
        <div class="wall-label">牌牆</div>
        <div class="wall-count" id="wallCount">70</div>
        <div class="wall-unit">張</div>
      </div>
    </div>

    <!-- Player bottom row -->
    <div class="hand-row" id="handRow">
      <div class="player-avatar avatar-player" id="avatar0">
        <div class="avatar-icon">🀄</div>
        <div class="avatar-name">你</div>
        <div class="avatar-score" id="playerScore">1000</div>
        <div class="avatar-tiles-count" id="playerTilesCount"><span>16</span>張</div>
      </div>
      <div class="meld-area" id="meldArea"></div>
      <div class="tiles-container" id="handTiles"></div>
    </div>
  </div>

  <!-- Action area -->
  <div class="action-area">
    <div class="game-status" id="gameStatus">等待開始...</div>
    <div class="action-buttons">
      <button class="action-btn btn-start" id="btnStart">開始遊戲</button>
      <button class="action-btn btn-draw" id="btnDraw" disabled>摸牌</button>
      <button class="action-btn btn-discard" id="btnDiscard" disabled>出牌</button>
      <button class="action-btn btn-pon" id="btnPon" disabled>碰</button>
      <button class="action-btn btn-chi" id="btnChi" disabled>吃</button>
      <button class="action-btn btn-kan" id="btnKan" disabled>槓</button>
      <button class="action-btn btn-hu" id="btnHu" disabled>胡</button>
      <button class="action-btn btn-ai" id="btnAi">AI分析</button>
    </div>
  </div>

  <!-- Settings Panel -->
  <div class="settings-overlay" id="settingsOverlay"></div>
  <div class="settings-panel" id="settingsPanel">
    <h2>⚙️ 遊戲設定</h2>
    <div class="setting-group">
      <label>初始點數</label>
      <input type="number" id="settingInitial" value="1000" min="100" max="99999">
    </div>
    <div class="setting-group">
      <label>底（每局最低）</label>
      <input type="number" id="settingBase" value="50" min="10" max="1000">
    </div>
    <div class="setting-group">
      <label>台（每台）</label>
      <input type="number" id="settingFan" value="20" min="10" max="500">
    </div>
    <div class="setting-group">
      <label>AI 等級</label>
      <select id="settingAI">
      <option value="1">低（隨機）</option>
      <option value="2" selected>中（向聽數）</option>
      <option value="3">高（防禦）</option>
      </select>
    </div>
    <div class="setting-group">
      <label>模式</label>
      <select id="settingMode">
        <option value="ai" selected>單人（對戰 AI）</option>
        <option value="online">連線（預留）</option>
      </select>
    </div>
    <div class="setting-actions">
      <button class="action-btn btn-draw" id="btnSaveSettings">儲存</button>
      <button class="action-btn btn-pon" id="btnCloseSettings">關閉</button>
    </div>
  </div>

  <!-- Message Toast -->
  <div class="message-toast" id="messageToast"></div>

  <!-- Chi Overlay -->
  <div class="chi-overlay" id="chiOverlay">
    <div class="chi-panel">
      <div class="chi-title">🀐 請選擇吃牌方式</div>
      <div class="chi-options" id="chiOptions"></div>
      <button class="action-btn btn-pon" id="btnChiCancel">取消吃牌</button>
    </div>
  </div>

  <!-- Analysis Panel -->
  <div class="analysis-panel" id="analysisPanel">
    <h3>📊 AI 局勢分析</h3>
    <div id="analysisContent"></div>
    <button class="action-btn btn-kan" id="btnCloseAnalysis">關閉</button>
  </div>

  <script src="js/MahjongEngine.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
