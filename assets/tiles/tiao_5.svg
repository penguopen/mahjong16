<svg xmlns="http://www.w3.org/2000/svg" width="60" height="80" viewBox="0 0 60 80">
    <defs>
        <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
            <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-color="#00000055"/>
        </filter>
        <linearGradient id="face" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#faf5ed"/>
            <stop offset="50%" stop-color="#f5f0e0"/>
            <stop offset="100%" stop-color="#e8e0d0"/>
        </linearGradient>
        <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ddd0bc"/>
            <stop offset="100%" stop-color="#b8a080"/>
        </linearGradient>
    </defs>
    <!-- Shadow/depth layer -->
    <rect x="2" y="3" width="58" height="77" rx="5" fill="#00000033" filter="url(#shadow)"/>
    <!-- Main tile body -->
    <rect x="1" y="1" width="58" height="78" rx="5" fill="url(#face)" stroke="url(#border)" stroke-width="1.5"/>
    <!-- Inner bevel highlight -->
    <rect x="3" y="2" width="52" height="4" rx="2" fill="rgba(255,255,255,0.4)"/>
    <!-- Suit color bar -->
    <rect x="6" y="10" width="48" height="3" rx="1" fill="#2980b9" opacity="0.85"/>
    <!-- Suit label -->
    <text x="30" y="22" text-anchor="middle" font-family="Noto Sans TC, sans-serif" font-size="11" fill="#2980b9" font-weight="700">條</text>
    <!-- Bamboo sticks -->
    <rect x="10" y="28" width="4" height="18" rx="1.5" fill="#2980b9"/>
            <line x1="10" y1="36" x2="14" y2="36" stroke="#faf5ed" stroke-width="1.2"/>
            <rect x="22" y="28" width="4" height="18" rx="1.5" fill="#2980b9"/>
            <line x1="22" y1="36" x2="26" y2="36" stroke="#faf5ed" stroke-width="1.2"/>
            <rect x="34" y="28" width="4" height="18" rx="1.5" fill="#2980b9"/>
            <line x1="34" y1="36" x2="38" y2="36" stroke="#faf5ed" stroke-width="1.2"/>
            <rect x="46" y="28" width="4" height="18" rx="1.5" fill="#2980b9"/>
            <line x1="46" y1="36" x2="50" y2="36" stroke="#faf5ed" stroke-width="1.2"/>
            <rect x="22" y="50" width="4" height="18" rx="1.5" fill="#2980b9"/>
            <line x1="22" y1="58" x2="26" y2="58" stroke="#faf5ed" stroke-width="1.2"/>
            <rect x="34" y="50" width="4" height="18" rx="1.5" fill="#2980b9"/>
            <line x1="34" y1="58" x2="38" y2="58" stroke="#faf5ed" stroke-width="1.2"/>
</svg>
