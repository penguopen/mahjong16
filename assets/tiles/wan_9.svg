  <text x="30" y="55" text-anchor="middle" font-family="Noto Sans TC, sans-serif" font-size="36" fill="#c0392b" font-weight="900">九</text>
  <circle cx="18" cy="70" r="2.5" fill="#c0392b" opacity="0.5"/>
  <circle cx="30" cy="70" r="2.5" fill="#c0392b" opacity="0.5"/>
  <circle cx="42" cy="70" r="2.5" fill="#c0392b" opacity="0.5"/>
