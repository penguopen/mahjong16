<svg xmlns="http://www.w3.org/2000/svg" width="60" height="80" viewBox="0 0 60 80">
    <defs>
        <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
            <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-color="#00000055"/>
        </filter>
        <linearGradient id="face" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#faf5ed"/>
            <stop offset="50%" stop-color="#f5f0e0"/>
            <stop offset="100%" stop-color="#e8e0d0"/>
        </linearGradient>
        <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ddd0bc"/>
            <stop offset="100%" stop-color="#b8a080"/>
        </linearGradient>
    </defs>
    <!-- Shadow/depth layer -->
    <rect x="2" y="3" width="58" height="77" rx="5" fill="#00000033" filter="url(#shadow)"/>
    <!-- Main tile body -->
    <rect x="1" y="1" width="58" height="78" rx="5" fill="url(#face)" stroke="url(#border)" stroke-width="1.5"/>
    <!-- Inner bevel highlight -->
    <rect x="3" y="2" width="52" height="4" rx="2" fill="rgba(255,255,255,0.4)"/>
    <!-- Suit color bar -->
    <rect x="6" y="10" width="48" height="3" rx="1" fill="#2980b9" opacity="0.85"/>
    <!-- Suit label -->
    <text x="30" y="22" text-anchor="middle" font-family="Noto Sans TC, sans-serif" font-size="16" fill="#2980b9" font-weight="700">條</text>
    <!-- Bamboo sticks -->
    <rect x="8" y="26" width="3.5" height="15" rx="1.2" fill="#2980b9"/>
            <line x1="8" y1="32" x2="11.5" y2="32" stroke="#faf5ed" stroke-width="1"/>
            <rect x="20" y="26" width="3.5" height="15" rx="1.2" fill="#2980b9"/>
            <line x1="20" y1="32" x2="23.5" y2="32" stroke="#faf5ed" stroke-width="1"/>
            <rect x="32" y="26" width="3.5" height="15" rx="1.2" fill="#2980b9"/>
            <line x1="32" y1="32" x2="35.5" y2="32" stroke="#faf5ed" stroke-width="1"/>
            <rect x="44" y="26" width="3.5" height="15" rx="1.2" fill="#2980b9"/>
            <line x1="44" y1="32" x2="47.5" y2="32" stroke="#faf5ed" stroke-width="1"/>
            <rect x="14" y="44" width="3.5" height="15" rx="1.2" fill="#2980b9"/>
            <line x1="14" y1="50" x2="17.5" y2="50" stroke="#faf5ed" stroke-width="1"/>
            <rect x="26" y="44" width="3.5" height="15" rx="1.2" fill="#2980b9"/>
            <line x1="26" y1="50" x2="29.5" y2="50" stroke="#faf5ed" stroke-width="1"/>
            <rect x="38" y="44" width="3.5" height="15" rx="1.2" fill="#2980b9"/>
            <line x1="38" y1="50" x2="41.5" y2="50" stroke="#faf5ed" stroke-width="1"/>
</svg>
